name: DCO

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  DCO:
    name: DCO
    runs-on: ubuntu-latest
    steps:
      - name: Verify Signed-off-by on every commit
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const failures = [];
            for (const c of commits) {
              const sha = c.sha.substring(0, 7);
              // Merge commits (2+ parents) are not authored work — skip them.
              if (c.parents && c.parents.length > 1) continue;

              const message = c.commit.message || '';
              const matches = [...message.matchAll(/^Signed-off-by: (.+) <(.+)>$/gim)];
              if (matches.length === 0) {
                failures.push(`${sha}: missing "Signed-off-by" trailer`);
                continue;
              }

              const author = c.commit.author || {};
              const name = (author.name || '').trim().toLowerCase();
              const email = (author.email || '').trim().toLowerCase();
              const ok = matches.some(
                (m) => m[1].trim().toLowerCase() === name && m[2].trim().toLowerCase() === email
              );
              if (!ok) {
                failures.push(
                  `${sha}: "Signed-off-by" does not match author ${author.name} <${author.email}>`
                );
              }
            }

            if (failures.length) {
              core.setFailed(
                'DCO check failed — every commit must carry a "Signed-off-by" trailer matching its ' +
                  'author (commit with `git commit -s`). See CONTRIBUTING.md and the DCO file.\n\n' +
                  failures.join('\n')
              );
            } else {
              core.info(`DCO: all ${commits.length} commit(s) signed off.`);
            }
