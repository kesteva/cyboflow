name: Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.15.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run type checking
      run: pnpm typecheck

    - name: Run linting
      run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality-checks

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.15.1'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    # The root `postinstall` (electron-builder install-app-deps) rebuilds
    # better-sqlite3 against the Electron ABI. The unit suite runs under host
    # Node (vitest), so restore the host-Node ABI or main DB tests throw
    # NODE_MODULE_VERSION mismatches. See CLAUDE.md. The rebuild is wrapped in
    # scripts/rebuild-better-sqlite3-host.mjs, which asserts a real :memory:
    # database opens post-rebuild and retries once with a forced source build
    # before failing loudly — a bare `pnpm rebuild` can silently leave a stale
    # wrong-arch prebuild in place.
    - name: Rebuild better-sqlite3 for host Node ABI
      run: node scripts/rebuild-better-sqlite3-host.mjs

    # Headless unit chain (main + frontend vitest, schema parity, build scripts).
    # The Playwright E2E suite is intentionally excluded: the renderer cannot
    # bootstrap in CI without the Electron preload-injected electronTRPC bridge,
    # so it fails on every run regardless of the change. See CLAUDE.md; re-add an
    # E2E job once the Playwright config uses _electron.launch().
    - name: Run unit tests
      run: pnpm test:unit
      env:
        CI: true
      timeout-minutes: 10

    # Report-only coverage — no threshold yet (see docs/proposals/test-coverage-tightening-plan.md
    # Workstream C). continue-on-error so a coverage-run hiccup never blocks the gate; this step
    # exists purely to make coverage visible while a baseline is established. The text-reporter
    # table (main/frontend vitest.config.ts both list 'text' first) is captured to a log file and
    # tailed into the job summary rather than parsing a coverage-summary.json the 'text'/'json'/
    # 'html' reporter set doesn't produce.
    - name: Coverage (report-only, main)
      if: always()
      continue-on-error: true
      run: pnpm --filter main exec vitest run --coverage --reporter=dot | tee main-coverage.log
      env:
        CI: true
      timeout-minutes: 10

    - name: Coverage summary (main)
      if: always()
      continue-on-error: true
      run: |
        {
          echo "### Main coverage (report-only)"
          echo '```'
          tail -n 60 main-coverage.log 2>/dev/null || echo "(no coverage output captured)"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Coverage (report-only, frontend)
      if: always()
      continue-on-error: true
      run: pnpm --filter frontend exec vitest run --coverage --reporter=dot | tee frontend-coverage.log
      env:
        CI: true
      timeout-minutes: 10

    - name: Coverage summary (frontend)
      if: always()
      continue-on-error: true
      run: |
        {
          echo "### Frontend coverage (report-only)"
          echo '```'
          tail -n 60 frontend-coverage.log 2>/dev/null || echo "(no coverage output captured)"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
